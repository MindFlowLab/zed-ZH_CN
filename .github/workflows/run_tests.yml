# Zed 汉化版 CI 工作流（fork 适配版）
#
# 由官方 run_tests.yml 精简改写，移除全部 zed-industries 私有基础设施依赖：
#   - 去掉 repository_owner 白名单与 orchestrate 智能过滤
#   - 使用 GitHub 官方 runner（ubuntu）替代私有 runner
#   - 去掉 sccache/R2、macOS/Windows/miri/wasm/docs/licenses/protobuf/extension 等
#     重型或绑定官方设施的 job，仅保留 Linux 上的核心校验
#   - clippy 使用 debug 模式（去掉 --release/--all-features），避免公共 runner 超时
#
# 保留的校验：
#   - check_style：cargo fmt / typos / check-todos / check-keymaps（快速门禁）
#   - clippy：全工作区编译 + lint（验证汉化改动不破坏编译）
#   - test：cargo nextest 全工作区测试
#
# 注意：本文件不再由 `cargo xtask workflows` 生成，请勿运行该命令覆盖本文件。
name: run_tests

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  CARGO_INCREMENTAL: "0"

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main
      - v[0-9]+.[0-9]+.x

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.ref_name == 'main' && github.sha || 'anysha' }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euxo pipefail {0}

jobs:
  check_style:
    name: 代码风格检查
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        run: rustup show

      - name: cargo fmt 检查
        run: cargo fmt --all -- --check

      - name: 拼写检查 (typos)
        # 固定到与上游一致的版本，避免 @master 新版词典引入误报
        uses: crate-ci/typos@2d0ce569feab1f8752f1dde43cc2f2aa53236e06
        with:
          config: ./typos.toml

      - name: 检查 TODO
        run: ./script/check-todos

      - name: 检查快捷键映射
        run: ./script/check-keymaps

  clippy:
    name: Clippy (Linux)
    needs: check_style
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      CC: clang
      CXX: clang++
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        run: rustup show

      - name: 配置 CI cargo config
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/ci-config.toml ./../.cargo/config.toml

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: 安装 Linux 系统依赖
        run: ./script/linux

      - name: 下载 wasi-sdk
        run: ./script/download-wasi-sdk

      # debug 模式 clippy：去掉 --release/--all-features 以适配公共 runner 算力，
      # 仍覆盖全工作区编译与 lint，足以校验汉化改动。
      - name: 运行 clippy
        run: cargo clippy --workspace --all-targets -- --deny warnings

      - name: 清理 cargo config
        if: always()
        run: rm -rf ./../.cargo

  test:
    name: 测试 (Linux)
    needs: check_style
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      CC: clang
      CXX: clang++
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 500ms --health-timeout 5s --health-retries 10
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Rust 工具链
        run: rustup show

      - name: 配置 CI cargo config
        run: |
          mkdir -p ./../.cargo
          cp ./.cargo/ci-config.toml ./../.cargo/config.toml

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: 安装 Linux 系统依赖
        run: ./script/linux

      - name: 下载 wasi-sdk
        run: ./script/download-wasi-sdk

      - name: 安装 Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 安装 cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: 运行测试
        run: cargo nextest run --workspace --no-fail-fast --no-tests=warn

      - name: 清理 cargo config
        if: always()
        run: rm -rf ./../.cargo
