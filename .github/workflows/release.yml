# Zed 汉化版发布工作流（fork 适配版）
#
# 由官方 release.yml 精简改写，移除全部 zed-industries 私有基础设施依赖：
#   - 去掉 repository_owner 白名单限制
#   - 使用 GitHub 官方 runner（ubuntu-22.04 / windows-2022）替代私有 runner
#   - 去掉 Sentry / Slack / R2 sccache / Azure 签名 / Apple 公证 / 合规检查
#   - 产物均为未签名版（fork 分发无官方证书）
#
# 触发方式：
#   - 推送 v* 标签
#   - 手动触发（workflow_dispatch）
#
# 注意：本文件不再由 `cargo xtask workflows` 生成，请勿运行该命令覆盖本文件。
name: release

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bundle_linux_x86_64:
    name: 构建 Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      # webrtc-sys 的 C++ 代码必须用 clang 17+ 编译（GCC 会把
      # "changes meaning of Network" 当硬错误，且不认识 -Wno-changes-meaning）。
      # ubuntu-22.04 默认 clang-14 太旧，需另行安装 clang-18。
      CC: clang-18
      CXX: clang++-18
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      # 复用 rust-toolchain.toml 中固定的工具链版本
      - name: 安装 Rust 工具链
        run: rustup show

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: 安装 Linux 系统依赖
        run: ./script/linux

      - name: 安装 clang-18
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo tee /etc/apt/trusted.gpg.d/apt.llvm.org.asc >/dev/null
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm-toolchain-18.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 llvm-18

      - name: 下载 wasi-sdk
        run: ./script/download-wasi-sdk

      - name: 打包 Linux
        run: ./script/bundle-linux

      - name: 上传 zed-linux-x86_64.tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: zed-linux-x86_64.tar.gz
          path: target/release/zed-linux-x86_64.tar.gz
          if-no-files-found: error

      - name: 上传 zed-remote-server-linux-x86_64.gz
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-linux-x86_64.gz
          path: target/zed-remote-server-linux-x86_64.gz
          if-no-files-found: error

  bundle_windows_x86_64:
    name: 构建 Windows x86_64
    # windows-2022 自带 Inno Setup 6 与 VS 2022（脚本已改用 vswhere 动态定位）
    runs-on: windows-2022
    timeout-minutes: 360
    env:
      # 缩短 cargo 缓存路径，规避 Windows 260 字符路径上限：
      # pet 依赖的测试夹具路径极长，默认 CARGO_HOME 下 checkout 会超限。
      CARGO_HOME: 'C:\c'
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Windows 长路径与 cargo 目录
        run: |
          New-Item -ItemType Directory -Path C:\c -Force | Out-Null
          try {
            New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
              -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
            git config --system core.longpaths true
          } catch {
            Write-Warning "启用长路径支持失败（已用缩短 CARGO_HOME 规避）: $_"
          }
        shell: pwsh

      - name: 安装 Rust 工具链
        run: rustup show
        shell: pwsh

      - name: 缓存 Rust 依赖
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: 打包 Windows（未签名）
        run: script/bundle-windows.ps1 -Architecture x86_64
        shell: pwsh

      - name: 上传 Zed-x86_64.exe
        uses: actions/upload-artifact@v4
        with:
          name: Zed-x86_64.exe
          path: target/Zed-x86_64.exe
          if-no-files-found: error

      - name: 上传 zed-remote-server-windows-x86_64.zip
        uses: actions/upload-artifact@v4
        with:
          name: zed-remote-server-windows-x86_64.zip
          path: target/zed-remote-server-windows-x86_64.zip
          if-no-files-found: error

  release:
    name: 发布到 GitHub Release
    needs:
      - bundle_linux_x86_64
      - bundle_windows_x86_64
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 计算版本号与标签
        id: meta
        run: |
          version="$(script/get-crate-version zed)"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          # tag 触发使用标签名；手动触发使用 v{版本号}
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v${version}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_REF_TYPE: ${{ github.ref_type }}

      - name: 下载全部构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: 整理产物
        run: |
          mkdir -p release-artifacts
          find ./artifacts -type f -exec mv {} release-artifacts/ \;
          ls -lR release-artifacts

      - name: 生成自动发布说明
        run: |
          # 调用 GitHub generate-notes，遵循 .github/release.yml 的分类配置
          if gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              -f tag_name="${TAG}" \
              -f target_commitish="${GITHUB_SHA}" \
              --jq '.body' > generated-notes.md 2>/dev/null; then
            echo "自动发布说明生成成功"
          else
            echo "自动生成失败，变更列表留空"
            : > generated-notes.md
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.meta.outputs.tag }}

      - name: 组装发布说明（固定头部 + 自动列表）
        run: |
          {
            echo "> **Zed 汉化版** — 基于 Zed v${VERSION} 的社区中文翻译构建。"
            echo ">"
            echo "> ⚠️ **未签名说明**：本构建未经代码签名。"
            echo "> - Windows：安装时可能出现 SmartScreen 提示，选择\"更多信息 → 仍要运行\"。"
            echo "> - Linux：解压 \`zed-linux-x86_64.tar.gz\` 后运行 \`bin/zed\`。"
            echo ""
            echo "---"
            echo ""
            echo "## 变更内容"
            echo ""
            cat generated-notes.md
          } > release-body.md
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      # softprops 会自动创建或更新 Release 及对应标签
      - name: 创建/更新 Release 并上传资产
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Zed ${{ steps.meta.outputs.version }} (汉化版)
          target_commitish: ${{ github.sha }}
          body_path: release-body.md
          make_latest: true
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
